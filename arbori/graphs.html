<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AVD - Grafuri</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" type="image/png" href="../AVD.png">
  <style>
    .tool-layout {
      display: grid;
      gap: 24px;
      padding: 40px 0 80px;
    }

    .panel {
      background: rgba(15, 17, 21, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(20px);
    }

    .panel h2 {
      margin-bottom: 20px;
      color: white;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    .field-group label {
      color: #cbd5e1;
      font-weight: 600;
    }

    .field-group textarea,
    .field-group select {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      color: #f8fafc;
      padding: 18px;
      font-size: 0.98rem;
      min-height: 120px;
      resize: vertical;
    }

    .field-group select {
      min-height: auto;
      padding: 14px 16px;
    }

    .actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 8px;
    }

    .btn-tool {
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.08);
      color: #f8fafc;
      cursor: pointer;
      transition: all 0.25s ease;
      min-width: 150px;
    }

    .btn-tool.primary {
      background: linear-gradient(135deg, #8b5cf6, #10b981);
      color: white;
    }

    .btn-tool.danger {
      background: #ef4444;
      color: white;
    }

    .btn-tool:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
    }

    .results-panel {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      padding: 24px;
    }

    .canvas-wrapper {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.03);
      padding: 16px;
    }

    .canvas-wrapper canvas {
      width: 100%;
      display: block;
      border-radius: 20px;
      background: #020204;
    }

    .message {
      color: #f8fafc;
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 18px;
      padding: 18px;
    }

    .page-hero {
      margin-top: 20px;
      padding-bottom: 14px;
    }
  </style>
</head>
<body>
    <div class="cursor-spotlight"></div>
    <div class="mesh-background">
        <div class="mesh-circle mesh-1"></div>
        <div class="mesh-circle mesh-2"></div>
    </div>

    <header class="nav">
      <div class="container nav-inner">
        <div class="brand">
          <a href="../index.html" class="brand-link">
            <img src="../AVD.png" alt="AVD Logo" class="brand-logo">
          </a>
        </div>

        <button class="hamburger" id="hamburger" aria-label="Meniu navigare">☰</button>

        <nav class="nav-links" id="navMenu">
          <a class="btn ghost" href="../index.html">Home</a>
          <a class="btn ghost" href="../contact.html">Contact</a>
          <a class="btn primary" href="../signup.html">Sign up</a>
  
        </nav>
      </div>
    </header>

    <main class="container">
        <section class="page-hero">
            <span class="hero-eyebrow">Atestat 2026</span>
            <h1><i class="fas fa-share-alt"></i> Creator de Grafuri</h1>
            <p class="subtitle">Creează grafuri neorientate cu multiple metode de reprezentare, rulează algoritmi și analizează proprietăți.</p>
        </section>

        <div class="tool-layout">
            <div class="panel">
                <h2><i class="fas fa-cogs"></i> Configurare</h2>
                <div class="field-group">
                    <label for="method"><i class="fas fa-sliders-h"></i> Metoda de creare:</label>
                    <select id="method" onchange="updateInputArea()">
                        <option value="direct">Direct G=(V,E)</option>
                        <option value="adjmatrix">Matrice de Adiacență</option>
                        <option value="adjlist">Listă de Adiacență</option>
                        <option value="incmatrix">Matrice de Incidență</option>
                    </select>
                </div>

                <div class="field-group">
                    <label><i class="fas fa-keyboard"></i> Date de intrare:</label>
                    <textarea id="input" placeholder="Introduceți datele grafului...">V={1,2,3,4,5} E={{1,2},{2,3},{3,4},{4,5},{1,5}}</textarea>
                </div>

                <div id="example" class="example-box"></div>

                <div class="actions-row">
                    <button class="btn-tool primary" onclick="createGraph()"><i class="fas fa-play"></i> Creează</button>
                    <button class="btn-tool" onclick="runBFS()"><i class="fas fa-layer-group"></i> BFS</button>
                    <button class="btn-tool" onclick="runDFS()"><i class="fas fa-sitemap"></i> DFS</button>
                    <button class="btn-tool" onclick="analyzeGraph()"><i class="fas fa-chart-line"></i> Analizează</button>
                    <button class="btn-tool" onclick="exportCanvas('graphCanvas')"><i class="fas fa-download"></i> Export</button>
                    <button class="btn-tool danger" onclick="clearCanvas('graphCanvas')"><i class="fas fa-trash"></i> Șterge</button>
                </div>
            </div>

            <div id="message" class="message" style="display:none;"></div>

            <div id="stats" class="results-panel" style="display:none;">
                <h3><i class="fas fa-info-circle"></i> Statistici Graf</h3>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-label">Vârfuri</span><span id="vertexCount" class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">Muchii</span><span id="edgeCount" class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">Grad maxim</span><span id="maxDegree" class="stat-value">0</span></div>
                    <div class="stat-item"><span class="stat-label">Conectat</span><span id="isConnected" class="stat-value">-</span></div>
                </div>
            </div>

            <div id="algorithms" class="results-panel" style="display:none;">
                <h3><i class="fas fa-route"></i> Rezultate Algoritmi</h3>
                <p id="bfsResult" class="algo-result"></p>
                <p id="dfsResult" class="algo-result"></p>
            </div>

            <div class="canvas-wrapper">
                <canvas id="graphCanvas" width="800" height="600"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-legal">&copy; 2026 Ronaldo AVD. All rights reserved.</div>
        </div>
    </footer>

    <script src="../js/app.js"></script>
    <script src="JavaScripi.js"></script>
</body>
</html>
